{% extends 'petitions/base.html' %}
{% load crispy_forms_tags %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card shadow-sm border-0 p-4">
                <div class="text-center mb-4">
                    <h2 class="fw-bold text-red">Login</h2>
                    <p class="text-muted">Masuk ke akun SuaraNusa Anda</p>
                </div>
                <form method="post">
                    {% csrf_token %}
                    {{ form|crispy }}
                    <div class="d-grid mt-4">
                        <button type="submit" class="btn btn-primary btn-lg fw-bold">Login</button>
                    </div>
                </form>
                <div class="text-center mt-4">
                    <p class="text-muted small">Belum punya akun? <a href="{% url 'register' %}" class="text-red fw-bold text-decoration-none">Daftar Sekarang</a></p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
